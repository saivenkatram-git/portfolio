<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Mobile browser chrome tint. Kept in sync with the active theme's --bg-base
		     via updateThemeColor() in +layout.svelte so status/URL bars match the page. -->
		<meta name="theme-color" content="#0d1220" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
